<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro Translator</title>
    <style>
        :root { --p: #8b5cf6; --bg: #09090b; --c: #18181b; --t: #f4f4f5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t); display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--c); width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; border: 1px solid #27272a; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { text-align: center; background: linear-gradient(45deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #a1a1aa; }
        
        /* Model Selection */
        select {
            width: 100%; padding: 12px; border-radius: 10px; background: #000; color: #fff; border: 1px solid #27272a; margin-bottom: 20px; outline: none;
        }

        /* Key Input Box */
        textarea { 
            width: 100%; height: 100px; background: #000; color: #10b981; border: 1px solid #27272a; 
            padding: 12px; border-radius: 12px; font-family: monospace; font-size: 12px; resize: none; box-sizing: border-box; margin-bottom: 15px;
        }
        
        .status-box { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #27272a; font-size: 13px; display: flex; justify-content: space-between; }
        .active-val { color: #fbbf24; font-weight: bold; }

        input[type="file"] { width: 100%; margin-bottom: 20px; color: #a1a1aa; }
        
        button { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-size: 16px; background: var(--p); color: white;
        }
        button:disabled { background: #27272a; opacity: 0.5; cursor: not-allowed; }

        #log { font-size: 11px; color: #71717a; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 Gemini SRT Pro</h2>

    <label>Select AI Model</label>
    <select id="modelSelect">
        <option value="gemini-1.5-pro">Gemini 3.1 Pro (Latest)</option>
        <option value="gemini-1.5-pro-002">Gemini 3.0 Pro</option>
        <option value="gemini-1.5-flash">Gemini 3.0 Flash (Faster)</option>
    </select>

    <label>Paste Multiple API Keys (Line by Line)</label>
    <textarea id="keysArea" placeholder="AIza...&#10;AIza...&#10;AIza..."></textarea>

    <div class="status-box">
        <span>Status: <span class="active-val" id="statusTxt">Idle</span></span>
        <span>Active Key: <span class="active-val" id="activeIdx">0</span></span>
    </div>

    <label>Choose SRT File</label>
    <input type="file" id="fileIn" accept=".srt">

    <button id="startBtn" onclick="runFlashAll()">Flash All & Translate</button>
    
    <div id="log">Key များနှင့် ဖိုင်ကို အရင်ရွေးချယ်ပါ။</div>
</div>

<script>
    let validKeys = [];

    async function runFlashAll() {
        const keyInput = document.getElementById('keysArea').value.trim();
        const model = document.getElementById('modelSelect').value;
        const file = document.getElementById('fileIn').files[0];
        const btn = document.getElementById('startBtn');
        const log = document.getElementById('log');

        validKeys = keyInput.split('\n').map(k => k.trim()).filter(k => k.length > 20);

        if (validKeys.length === 0) return alert("API Key ထည့်ပေးပါ။");
        if (!file) return alert("SRT ဖိုင် ရွေးပေးပါ။");

        btn.disabled = true;
        log.innerText = "Scanning keys for " + model + "...";

        for (let i = 0; i < validKeys.length; i++) {
            document.getElementById('activeIdx').innerText = i + 1;
            const isWorking = await testKey(validKeys[i], model);
            
            if (isWorking) {
                document.getElementById('statusTxt').innerText = "Running";
                document.getElementById('statusTxt').style.color = "#10b981";
                log.innerText = "✅ Key " + (i+1) + " အလုပ်လုပ်ပါသည်။ ဘာသာပြန်ခြင်း စတင်ပါပြီ။";
                // ဒီနေရာမှာ SRT Translation Logic ကို ဆက်လက်ထည့်သွင်းနိုင်ပါတယ်
                break;
            } else if (i === validKeys.length - 1) {
                log.innerText = "❌ မည်သည့် Key မှ အလုပ်မလုပ်ပါ။ (Limit ပြည့်နေခြင်း ဖြစ်နိုင်သည်)";
                btn.disabled = false;
            }
        }
    }

    async function testKey(key, model) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: "hi"}]}]})
            });
            return res.ok;
        } catch (e) { return false; }
    }
</script>

</body>
</html>
