<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Burmese AI Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #progress-bar { width: 0%; transition: width 0.4s ease; }
        .gradient-bg { background: linear-gradient(135deg, #1e1e2f 0%, #111119 100%); }
    </style>
</head>
<body class="gradient-bg text-white min-h-screen font-sans p-5 md:p-20">

    <div class="max-w-2xl mx-auto bg-gray-800/50 backdrop-blur-md p-8 rounded-2xl border border-gray-700 shadow-2xl">
        <h1 class="text-3xl font-extrabold mb-2 text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            SRT Burmese Translator
        </h1>
        <p class="text-center text-gray-400 text-sm mb-8">Powered by Gemini AI (Key Rotation System)</p>
        
        <div class="mb-8">
            <label class="block text-sm font-medium mb-3 text-blue-300">Choose SRT File</label>
            <input type="file" id="srtFile" accept=".srt" class="w-full text-sm text-gray-400 file:mr-4 file:py-2.5 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer bg-gray-900/50 rounded-full border border-gray-600">
        </div>

        <div id="statusSection" class="mb-8 hidden space-y-4">
            <div class="flex justify-between items-end">
                <div class="text-xs space-y-1">
                    <p id="timeCounter" class="text-emerald-400 font-mono">Time: 0s</p>
                    <p id="keyStatus" class="text-orange-300 italic">Key in use: #1</p>
                </div>
                <span id="percentText" class="text-2xl font-bold text-blue-400">0%</span>
            </div>
            <div class="w-full bg-gray-900 rounded-full h-3 overflow-hidden border border-gray-700">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-emerald-500 h-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
            </div>
            <p id="currentLine" class="text-sm text-gray-400 italic text-center truncate">Preparing translation...</p>
        </div>

        <button onclick="startTranslation()" id="startBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95">
            Start Burmese Translation
        </button>

        <div class="mt-6 text-[10px] text-gray-500 text-center">
            Note: This tool uses Key Rotation to bypass rate limits.
        </div>
    </div>

    <script>
        // ထည့်ပေးထားတဲ့ API Keys များ
        const API_KEYS = [
            "AIzaSyDKxhbbim5wtcsLKQKGevm80zZOffDYNFQ",
            "AIzaSyDa8QMr928UyDYGw0ctnkeWNHx0dIW7vo0",
            "AIzaSyBn_wlF3gzB0aXJOfmlmbaRBjEHhVpGFpU",
            "AIzaSyBJ2AusS7kuvNT123GbGyeksHD7yULx8AA",
            "AIzaSyDVv31SdxQNG0x5SmX10gkdR5IqC6bTnZ4"
        ];

        let currentKeyIndex = 0;
        let startTime;

        ထဲမှာ ဒီ logic ကို အစားထိုးပါ
async function startTranslation() {
    const fileInput = document.getElementById('srtFile');
    const file = fileInput.files[0];
    const text = await file.text();
    const lines = text.split(/\r?\n/);
    
    document.getElementById('statusSection').classList.remove('hidden');
    startTime = Date.now();

    let translatedSrt = "";
    let batchText = [];
    let batchMap = [];

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();

        // စာသားဖြစ်ရင် batch ထဲထည့်
        if (line !== "" && !line.match(/^\d+$/) && !line.includes("-->")) {
            batchText.push(line);
            batchMap.push(i);
        }

        // ၅ ကြောင်းပြည့်ရင် သို့မဟုတ် ဖိုင်ဆုံးရင် ပို့မယ်
        if (batchText.length === 5 || (i === lines.length - 1 && batchText.length > 0)) {
            const prompt = `Translate these lines to Burmese naturally. Keep lines separated by "|||". Only return translation:\n${batchText.join("|||")}`;
            
            const translatedResult = await translateWithGemini(prompt);
            const translatedArray = translatedResult.split("|||");

            // မူရင်း lines ထဲ ပြန်ထည့်
            batchMap.forEach((originalIndex, idx) => {
                lines[originalIndex] = translatedArray[idx] || batchText[idx];
            });

            // UI Update
            const progress = Math.round(((i + 1) / lines.length) * 100);
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('percentText').innerText = progress + "%";
            
            // 🛑 ၃ စက္ကန့် နားမယ် (Rate Limit မမိအောင်)
            await new Promise(resolve => setTimeout(resolve, 3000));

            batchText = [];
            batchMap = [];
        }
    }

    // ပြီးရင် download လုပ်မယ်
    downloadFile(lines.join("\n"), file.name.replace(".srt", "_MM.srt"));
}

        async function translateWithGemini(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEYS[currentKeyIndex]}`;
            
            const body = {
                contents: [{ parts: [{ text: `Translate this to natural Burmese: "${text}". Return ONLY the translation.` }] }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                return data.candidates[0].content.parts[0].text.trim();

            } catch (err) {
                console.warn(`Key ${currentKeyIndex} failed, rotating...`);
                
                // Key Rotation Logic
                if (currentKeyIndex < API_KEYS.length - 1) {
                    currentKeyIndex++;
                    document.getElementById('keyStatus').innerText = `Key in use: #${currentKeyIndex + 1}`;
                    return translateWithGemini(text); // Key အသစ်နဲ့ ပြန်ကြိုးစားမယ်
                } else {
                    return "[Limit Exceeded] " + text;
                }
            }
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timeCounter').innerText = `Time: ${elapsed}s`;
        }

        function downloadFile(content, fileName) {
            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
