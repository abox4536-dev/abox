<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper SRT Master</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0d1117; --card: #161b22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #8b949e; }
        input[type="file"], button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; font-size: 15px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #30363d; background: #010409; color: white; box-sizing: border-box; font-size: 15px; }
        button { background: #238636; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { background: #2ea043; }
        button:disabled { background: #555; cursor: not-allowed; }
        #dlBtn { background: #0ea5e9; display: none; margin-top: 10px; }
        .progress-bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; display: none; margin-bottom: 10px; }
        .fill { width: 0%; height: 100%; background: var(--primary); transition: 0.4s; }
        #status { text-align: center; font-size: 14px; margin: 10px 0; color: #fbbf24; min-height: 20px; }
        textarea { width: 100%; height: 280px; background: #010409; color: #7ee787; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-family: monospace; display: none; line-height: 1.6; }
        footer { margin-top: 30px; color: #8b949e; font-size: 12px; text-align: center; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎙️ Whisper SRT Master</h2>
    <label for="apiKey">Groq API Key</label>
    <input type="text" id="apiKey" placeholder="gsk_... သင့်ရဲ့ API Key ကိုထည့်ပါ">
    <label for="audioFile">အသံဖိုင် ရွေးချယ်ပါ</label>
    <input type="file" id="audioFile" accept="audio/*">
    <button id="runBtn" onclick="generateSRT()">SRT စတင်ထုတ်ယူမည်</button>

    <div class="progress-bar" id="pBar"><div class="fill" id="pFill"></div></div>
    <div id="status"></div>

    <textarea id="output" readonly spellcheck="false"></textarea>
    <button id="dlBtn" onclick="downloadSrt()">📥 SRT ဖိုင်ကို သိမ်းဆည်းမည်</button>
</div>

<footer>
    <p>Gemini Enterprise မှ ဖန်တီးထားပါသည်။</p>
</footer>

<script>
    async function generateSRT() {
        const file = document.getElementById('audioFile').files[0];
        const key = document.getElementById('apiKey').value;
        if (!key) {
            alert("Groq API Key ကို အရင်ထည့်ပါ");
            return;
        }
        if (!file) {
            alert("ဖိုင်အရင်ရွေးပါ");
            return;
        }
        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const pBar = document.getElementById('pBar');
        const pFill = document.getElementById('pFill');
        const output = document.getElementById('output');
        const dlBtn = document.getElementById('dlBtn');

        btn.disabled = true;
        btn.innerText = "လုပ်ဆောင်နေပါသည်...";
        pBar.style.display = 'block';
        pFill.style.width = "0%";
        output.style.display = 'none';
        dlBtn.style.display = 'none';
        status.innerText = "ဖိုင်ကို upload တင်နေပါသည်...";
        
        const formData = new FormData();
        formData.append("file", file);
        formData.append("model", "whisper-large-v3");
        formData.append("response_format", "verbose_json");

        try {
            pFill.style.width = "20%";
            status.innerText = "စကားပြောများကို စာသားအဖြစ် ပြောင်းနေပါသည်...";
            const response = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}` },
                body: formData
            });
            
            pFill.style.width = "60%";
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "API Error");

            status.innerText = "SRT format သို့ ပြောင်းနေပါသည်...";
            const srtResult = processSegments(data.segments);
            output.value = srtResult;
            pFill.style.width = "100%";
            output.style.display = "block";
            dlBtn.style.display = "block";
            status.innerText = "အောင်မြင်စွာ ပြီးစီးပါပြီ!";
        } catch (e) {
            status.innerText = "Error: " + e.message;
            pBar.style.display = 'none';
        } finally {
            btn.disabled = false;
            btn.innerText = "SRT စတင်ထုတ်ယူမည်";
        }
    }

    function processSegments(segments) {
        let finalSRT = "";
        let srtIndex = 1;
        for (const s of segments) {
            const start = formatTime(s.start);
            const end = formatTime(s.end);
            let text = s.text.trim();
            if (text.includes(',')) {
                text = text.replace(/,\s*/g, ',\n');
                let lines = text.split('\n');
                if (lines.length > 2) text = lines.slice(0, 2).join('\n');
            }
            finalSRT += `${srtIndex}\n${start} --> ${end}\n${text}\n\n`;
            srtIndex++;
        }
        return finalSRT;
    }

    function formatTime(seconds) {
        const date = new Date(seconds * 1000);
        const hh = String(date.getUTCHours()).padStart(2, '0');
        const mm = String(date.getUTCMinutes()).padStart(2, '0');
        const ss = String(date.getUTCSeconds()).padStart(2, '0');
        const ms = String(date.getUTCMilliseconds()).padStart(3, '0');
        return `${hh}:${mm}:${ss},${ms}`;
    }

    function downloadSrt() {
        const srtContent = document.getElementById('output').value;
        const bom = "\uFEFF";
        const blob = new Blob([bom + srtContent], { type: 'text/srt;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const audioFileName = document.getElementById('audioFile').files[0].name;
        const srtFileName = audioFileName.substring(0, audioFileName.lastIndexOf('.')) + ".srt";
        a.download = srtFileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
