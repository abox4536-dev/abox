<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Flash All - Auto Rotation</title>
    <style>
        :root {
            --primary: #a855f7;
            --secondary: #ec4899;
            --bg: #09090b;
            --card: #18181b;
            --text: #f4f4f5;
        }

        body {
            font-family: 'Inter', 'Pyidaungsu', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #27272a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-size: 14px; color: #a1a1aa; }

        /* Key Input Box */
        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            color: #10b981;
            border: 1px solid #27272a;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }
        textarea:focus { border-color: var(--primary); }

        .status-panel {
            background: #000;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #27272a;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .indicator { color: #fbbf24; font-weight: bold; }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        #actionBtn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        #actionBtn:disabled {
            background: #27272a;
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .log {
            margin-top: 20px;
            font-size: 12px;
            color: #71717a;
            text-align: center;
            height: 40px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Gemini Flash All</h2>

    <div class="input-group">
        <label>Gemini API Keys (စာကြောင်းခြားပြီး အကုန်ထည့်ပါ)</label>
        <textarea id="multiKeys" placeholder="AIza...&#10;AIza...&#10;AIza..."></textarea>
    </div>

    <div class="status-panel">
        <div>Status: <span id="currentStatus" class="indicator">Waiting...</span></div>
        <div>Active Key: <span id="keyIndex" class="indicator">0</span></div>
    </div>

    <div class="input-group">
        <label>SRT File ရွေးချယ်ပါ</label>
        <input type="file" id="srtFile" accept=".srt" style="width: 100%; color: #a1a1aa;">
    </div>

    <button id="actionBtn" onclick="initiateFlash()">Flash All & Start</button>

    <div class="log" id="logMsg">Keys များကို စစ်ဆေးရန် အဆင်သင့်ဖြစ်ပါပြီ။</div>
</div>

<script>
    let activeKeys = [];
    let workingKey = "";

    async function initiateFlash() {
        const rawInput = document.getElementById('multiKeys').value.trim();
        const file = document.getElementById('srtFile').files[0];
        const btn = document.getElementById('actionBtn');
        const status = document.getElementById('currentStatus');
        const log = document.getElementById('logMsg');

        // Keys များကို List ပြောင်းခြင်း
        activeKeys = rawInput.split('\n').map(k => k.trim()).filter(k => k.length > 20);

        if (activeKeys.length === 0) return alert("API Key အနည်းဆုံး တစ်ခု ထည့်ပေးပါ။");
        if (!file) return alert("SRT ဖိုင် အရင်ရွေးချယ်ပါ။");

        btn.disabled = true;
        status.innerText = "Scanning...";
        
        // Flash All Logic: အလုပ်လုပ်တဲ့ Key ကို လိုက်ရှာခြင်း
        for (let i = 0; i < activeKeys.length; i++) {
            log.innerText = `Testing Key ${i + 1} of ${activeKeys.length}...`;
            document.getElementById('keyIndex').innerText = i + 1;

            const isValid = await checkGeminiKey(activeKeys[i]);
            
            if (isValid) {
                workingKey = activeKeys[i];
                status.innerText = "Ready!";
                status.style.color = "#10b981";
                log.innerText = "✅ အလုပ်လုပ်သော Key ကို တွေ့ရှိပါပြီ။ ဘာသာပြန်ခြင်း စတင်နေပါသည်။";
                
                // ဤနေရာတွင် ဘာသာပြန်ခြင်း Function ကို ဆက်လက်ပတ်မည်
                // startTranslation(workingKey, file); 
                break;
            }

            if (i === activeKeys.length - 1 && !workingKey) {
                status.innerText = "Failed";
                status.style.color = "#ef4444";
                log.innerText = "❌ မည်သည့် Key မှ အသုံးမပြုနိုင်ပါ။ Key အသစ်များ ပြန်ထည့်ပါ။";
                btn.disabled = false;
            }
        }
    }

    async function checkGeminiKey(key) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
            });
            return response.ok;
        } catch (e) {
            return false;
        }
    }
</script>

</body>
</html>
