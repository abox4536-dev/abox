<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini SRT Translator - AI Professional</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', 'Pyidaungsu', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #334155;
            padding: 40px 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(15, 23, 42, 0.5);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.05);
        }

        #fileInput { display: none; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-val { font-size: 18px; font-weight: bold; color: var(--primary); }
        .stat-lab { font-size: 12px; color: var(--text-dim); margin-top: 5px; }

        .progress-container {
            margin: 20px 0;
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 8px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            width: 0%;
            transition: 0.4s;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:disabled { background: #334155; cursor: not-allowed; }

        #statusText {
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            color: #fbbf24;
        }

        .log-area {
            background: #000;
            color: #10b981;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            border-radius: 8px;
            height: 80px;
            overflow-y: auto;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gemini SRT Translator</h1>
    <p class="sub-title">AI-Powered Natural Burmese Translation</p>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p id="fileNameDisplay">SRT ဖိုင်ကို ဆွဲထည့်ပါ (သို့) နှိပ်၍ရွေးပါ</p>
        <input type="file" id="fileInput" accept=".srt">
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-val" id="timeCounter">00:00</div>
            <div class="stat-lab">Processing Time</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="keyStatus">Key-1</div>
            <div class="stat-lab">Active Engine</div>
        </div>
    </div>

    <div class="progress-container" id="progContainer">
        <div class="progress-header">
            <span id="progPercent">0% Completed</span>
            <span id="progCounts">0/0 lines</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progFill"></div>
        </div>
    </div>

    <button id="startBtn" onclick="startTranslation()">ဘာသာပြန်ခြင်း စတင်မည်</button>
    <div id="statusText">ဖိုင်ရွေးချယ်ရန် အဆင်သင့်ဖြစ်ပါပြီ</div>
    
    <div class="log-area" id="logArea"></div>
</div>

<script>
    // Gemini API Keys Pool (Auto Rotation)
    const apiKeys = [
        "AIzaSyATSwdlP9mJ3mToGq-cXW1AuY5sw-C6oeg",
        "AIzaSyDVv31SdxQNG0x5SmX10gkdR5IqC6bTnZ4",
        "AIzaSyBJ2AusS7kuvNT123GbGyeksHD7yULx8AA"
    ];

    let currentKeyIdx = 0;
    let startTime;
    let timerInterval;

    // Drag & Drop Handlers
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        document.getElementById('fileInput').files = e.dataTransfer.files;
        updateFileName();
    });

    document.getElementById('fileInput').onchange = updateFileName;

    function updateFileName() {
        const file = document.getElementById('fileInput').files[0];
        if(file) document.getElementById('fileNameDisplay').innerText = `Selected: ${file.name}`;
    }

    async function startTranslation() {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return alert("ကျေးဇူးပြု၍ SRT ဖိုင်ကို အရင်ရွေးချယ်ပါ။");

        const text = await file.text();
        const srtBlocks = parseSRT(text);
        
        prepareUI(srtBlocks.length);
        startTimer();

        let translatedSrt = "";
        const batchSize = 10; // ဘာသာပြန်မြန်စေရန် တစ်ခါပြန်ရင် ၁၀ ကြောင်းနှုန်း
        
        for (let i = 0; i < srtBlocks.length; i += batchSize) {
            const batch = srtBlocks.slice(i, i + batchSize);
            const batchText = batch.map(b => b.text).join("\n---\n");
            
            let success = false;
            while (!success) {
                const result = await callGemini(batchText);
                if (result) {
                    const translatedLines = result.split("\n---\n");
                    batch.forEach((block, index) => {
                        const tText = translatedLines[index] || block.text;
                        translatedSrt += `${block.id}\n${block.time}\n${tText.trim()}\n\n`;
                    });
                    success = true;
                    updateProgress(i + batch.length, srtBlocks.length);
                } else {
                    rotateKey();
                }
            }
        }

        finishTranslation(translatedSrt);
    }

    async function callGemini(text) {
        const key = apiKeys[currentKeyIdx];
        const prompt = `Translate the following subtitle lines into natural, human-like Burmese. Keep the meaning accurate but conversational. 
        Important: Separate each line using '---' marker. Do not include original text in output.
        Text to translate:
        ${text}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            return null;
        }
    }

    function rotateKey() {
        currentKeyIdx = (currentKeyIdx + 1) % apiKeys.length;
        document.getElementById('keyStatus').innerText = `Key-${currentKeyIdx + 1}`;
        addLog(`API Limit reached. Switching to Engine ${currentKeyIdx + 1}...`);
    }

    function parseSRT(data) {
        const blocks = [];
        const lines = data.split(/\r?\n\r?\n/);
        lines.forEach(block => {
            const parts = block.split(/\r?\n/);
            if(parts.length >= 3) {
                blocks.push({
                    id: parts[0],
                    time: parts[1],
                    text: parts.slice(2).join(" ")
                });
            }
        });
        return blocks;
    }

    function prepareUI(total) {
        document.getElementById('startBtn').disabled = true;
        document.getElementById('progContainer').style.display = 'block';
        document.getElementById('logArea').style.display = 'block';
        document.getElementById('progCounts').innerText = `0 / ${total} lines`;
        addLog("Translation starting...");
    }

    function updateProgress(current, total) {
        const percent = Math.round((current / total) * 100);
        document.getElementById('progFill').style.width = percent + "%";
        document.getElementById('progPercent').innerText = percent + "% Completed";
        document.getElementById('progCounts').innerText = `${current} / ${total} lines`;
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timeCounter').innerText = `${m}:${s}`;
        }, 1000);
    }

    function addLog(msg) {
        const log = document.getElementById('logArea');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    function finishTranslation(content) {
        clearInterval(timerInterval);
        const blob = new Blob([content], { type: 'text/srt' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "translated_myanmar.srt";
        a.click();
        
        document.getElementById('statusText').innerText = "ဘာသာပြန်ပြီးပါပြီ။ ဖိုင်ကို ဒေါင်းလုဒ်ဆွဲလိုက်ပါပြီ။";
        document.getElementById('statusText').style.color = "#10b981";
        document.getElementById('startBtn').disabled = false;
        addLog("Process Finished successfully.");
    }
</script>

</body>
</html>
