<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini SRT Pro - Translator</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg: #0f172a;
            --card: #1e293b;
            --input-bg: #0f172a;
            --text-main: #f1f5f9;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { text-align: center; margin-bottom: 25px; color: var(--primary); }

        /* Key Input Section */
        .key-section {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }

        label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="password"] {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: var(--input-bg);
            color: white;
            outline: none;
        }

        input[type="password"]:focus { border-color: var(--primary); }

        .verify-btn {
            padding: 0 20px;
            background: #334155;
            color: white;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .verify-btn.valid { background: var(--success); }

        /* Upload Section */
        .upload-area {
            border: 2px dashed #334155;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .upload-area.active { border-color: var(--primary); background: rgba(139, 92, 246, 0.05); }

        #fileInput { display: none; }

        .progress-bar {
            height: 6px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            margin: 20px 0;
        }

        .fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }

        #startBtn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
        }

        #startBtn.ready { opacity: 1; pointer-events: auto; }

        #status { text-align: center; margin-top: 15px; font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 Gemini SRT Pro</h2>

    <div class="key-section">
        <label>Gemini API Key ထည့်သွင်းပါ</label>
        <div class="input-group">
            <input type="password" id="apiKeyInput" placeholder="Enter your API Key here...">
            <button class="btn verify-btn" id="verifyBtn" onclick="verifyKey()">Verify</button>
        </div>
        <div id="keyNote" style="font-size: 11px; margin-top: 8px; color: #64748b;">* Key ကို Verify အရင်လုပ်ပေးပါ။</div>
    </div>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">SRT ဖိုင်ကို ဒီမှာတင်ပါ</span>
        <input type="file" id="fileInput" accept=".srt">
    </div>

    <div class="progress-bar" id="pBar"><div class="fill" id="pFill"></div></div>

    <button id="startBtn" onclick="processTranslation()">Translate & Download</button>
    
    <div id="status">Waiting for API Key...</div>
</div>

<script>
    let isKeyValid = false;
    let validatedKey = "";

    // Verify Key Logic
    async function verifyKey() {
        const keyInput = document.getElementById('apiKeyInput');
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('status');
        const key = keyInput.value.trim();

        if (!key) return alert("Key ထည့်ပါ");

        btn.innerText = "Checking...";
        
        try {
            // Gemini API ကို sample request တစ်ခုပို့ပြီး စစ်ဆေးခြင်း
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Hi" }] }] })
            });

            if (response.ok) {
                isKeyValid = true;
                validatedKey = key;
                btn.innerText = "✓ Valid";
                btn.classList.add('valid');
                keyInput.disabled = true;
                status.innerText = "Key အဆင်ပြေပါတယ်။ ဖိုင်ရွေးချယ်နိုင်ပါပြီ။";
                checkReadyState();
            } else {
                throw new Error();
            }
        } catch (e) {
            btn.innerText = "Verify";
            alert("API Key မှားယွင်းနေပါသည် သို့မဟုတ် Limit ပြည့်နေပါသည်။");
        }
    }

    function checkReadyState() {
        const file = document.getElementById('fileInput').files[0];
        const btn = document.getElementById('startBtn');
        if (isKeyValid && file) {
            btn.classList.add('ready');
        }
    }

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('fileName').innerText = file.name;
            checkReadyState();
        }
    };

    // Translation Logic (Simplified for Example)
    async function processTranslation() {
        const file = document.getElementById('fileInput').files[0];
        const status = document.getElementById('status');
        const pBar = document.getElementById('pBar');
        const pFill = document.getElementById('pFill');

        status.innerText = "Translating... Please wait.";
        pBar.style.display = "block";
        pFill.style.width = "40%";

        // ... အရှေ့ကပေးထားတဲ့ Gemini Translation Logic အတိုင်း ဤနေရာတွင် ဆက်လက်လုပ်ဆောင်ပါ ...
        // (ValidatedKey ကို အသုံးပြု၍ fetch ခေါ်ပါ)

        setTimeout(() => {
            pFill.style.width = "100%";
            status.innerText = "အောင်မြင်စွာ ဘာသာပြန်ပြီးပါပြီ။";
        }, 2000);
    }
</script>

</body>
</html>
