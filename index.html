<!DOCTYPE html>
<html lang="my" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT to Burmese - Gemini AI Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] { --primary: #4F46E5; --primary-hover: #4338CA; --secondary: #10B981; --accent: #F59E0B; --bg: #F8FAFC; --card-bg: rgba(255, 255, 255, 0.9); --text-main: #1E293B; --text-muted: #64748B; --border: #E2E8F0; --input-bg: #FFFFFF; --radius: 12px; }
        :root[data-theme="dark"] { --primary: #818CF8; --primary-hover: #6366F1; --secondary: #34D399; --accent: #FBBF24; --bg: #0F172A; --card-bg: rgba(30, 41, 59, 0.9); --text-main: #F1F5F9; --text-muted: #94A3B8; --border: #334155; --input-bg: #1E293B; --radius: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; line-height: 1.6; padding-bottom: 2rem; transition: background 0.3s, color 0.3s; }
        h1 { font-family: 'Clash Grotesk', sans-serif; font-weight: 700; text-align: center; margin-bottom: 0.5rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; }
        header { background: var(--card-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.25rem; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.25rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .theme-toggle { background: var(--border); border: none; padding: 0.5rem; border-radius: 50%; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .main-grid { display: grid; grid-template-columns: 380px 1fr; gap: 1.5rem; margin-top: 2rem; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-main); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-muted); }
        input, select, textarea { width: 100%; padding: 0.75rem; border: 1.5px solid var(--border); border-radius: 10px; background: var(--input-bg); color: var(--text-main); font-family: inherit; }
        .btn { padding: 0.75rem; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; justify-content: center; align-items: center; gap: 0.5rem; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-main); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        textarea { min-height: 250px; font-family: monospace; font-size: 0.9rem; }
        .progress-wrapper { margin-top: 1rem; display: none; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem; background: var(--card-bg); color: var(--text-main); border-radius: 10px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-left: 4px solid var(--primary); z-index: 1000; transition: 0.3s; }
        .hidden { display: none; }
        .status-text { font-size: 0.8rem; font-weight: 600; margin-top: 0.5rem; }
        .status-success { color: var(--secondary); }
        .status-error { color: #ef4444; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="nav-content">
                <div class="logo">✨ SRT Translator</div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-grid">
            <aside>
                <div class="card">
                    <div class="card-title">🔑 API Key</div>
                    <div class="form-group">
                        <input type="password" id="apiKey" placeholder="Enter Gemini API Key">
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-outline" onclick="saveKey()">Save</button>
                        <button class="btn btn-primary" onclick="verifyKey()">Verify</button>
                    </div>
                    <div id="keyStatus" class="status-text hidden"></div>
                </div>
                <div class="card">
                    <div class="card-title">⚙️ Settings</div>
                    <div class="form-group">
                        <label>AI Model</label>
                        <select id="model">
                            <option value="gemini-1.5-flash-latest" selected>Gemini 1.5 Flash</option>
                            <option value="gemini-1.5-pro-latest">Gemini 1.5 Pro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Upload SRT</label>
                        <input type="file" id="srtFile" accept=".srt">
                    </div>
                </div>
            </aside>

            <main>
                <div class="card">
                    <div class="card-title">📄 Original</div>
                    <textarea id="originalSrt" placeholder="Paste SRT content here..."></textarea>
                </div>
                <div class="card">
                    <div class="card-title">✨ Translated</div>
                    <textarea id="translatedSrt" placeholder="Translated text will appear here..." readonly></textarea>
                    <div id="actionBtns" class="btn-group hidden" style="margin-top: 1rem;">
                        <button class="btn btn-primary" onclick="downloadSrt()">Download</button>
                        <button class="btn btn-outline" onclick="copySrt()">Copy</button>
                    </div>
                </div>
                <button id="translateBtn" class="btn btn-primary" style="padding: 1rem;" onclick="translateSubtitles()">🚀 Start Translation</button>
                <div id="progressWrapper" class="progress-wrapper">
                    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 0.3rem;">
                        <span id="progressStatus">Ready</span>
                        <span id="progressPercent">0%</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let isKeyValid = false;

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) { document.getElementById('apiKey').value = savedKey; verifyKey(); }
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        };

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key) { localStorage.setItem('gemini_api_key', key); toast('Key saved!'); }
        }

        async function verifyKey() {
            const key = document.getElementById('apiKey').value.trim();
            const status = document.getElementById('keyStatus');
            if (!key) return;
            status.classList.remove('hidden'); status.textContent = '⌛ Verifying...';
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
                if (res.ok) { isKeyValid = true; status.textContent = '✓ Valid Key'; status.className = 'status-text status-success'; }
                else { isKeyValid = false; status.textContent = '✗ Invalid Key'; status.className = 'status-text status-error'; }
            } catch { isKeyValid = false; status.textContent = '✗ Error'; }
        }

        function toast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        async function translateSubtitles() {
            const key = document.getElementById('apiKey').value.trim();
            const modelName = document.getElementById('model').value;
            const content = document.getElementById('originalSrt').value.trim();
            if (!isKeyValid || !content) return toast('Check Key and Content');

            const btn = document.getElementById('translateBtn');
            const fill = document.getElementById('progressFill');
            const percent = document.getElementById('progressPercent');
            const status = document.getElementById('progressStatus');
            
            btn.disabled = true; document.getElementById('progressWrapper').style.display = 'block';
            
            try {
                const blocks = content.split('\n\n').filter(b => b.trim());
                const batchSize = 10; let fullResult = '';

                for (let i = 0; i < blocks.length; i += batchSize) {
                    const batch = blocks.slice(i, i + batchSize).join('\n\n');
                    const prompt = `Keep SRT format. Translate only text to Burmese (conversational style). Preserve timecodes.\n\n${batch}`;
                    
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    if (!res.ok) throw new Error('API Error');
                    const data = await res.json();
                    const translated = data.candidates[0].content.parts[0].text.replace(/```srt|```/g, '').trim();
                    fullResult += translated + '\n\n';
                    document.getElementById('translatedSrt').value = fullResult.trim();
                    
                    const progress = Math.round(((i + batchSize) / blocks.length) * 100);
                    fill.style.width = `${progress}%`; percent.textContent = `${progress}%`;
                    status.textContent = `Processing batch...`;
                }
                document.getElementById('actionBtns').classList.remove('hidden');
                toast('Done!');
            } catch (e) { toast('Error: ' + e.message); }
            finally { btn.disabled = false; }
        }

        function downloadSrt() {
            const blob = new Blob([document.getElementById('translatedSrt').value], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'burmese.srt'; a.click();
        }

        function copySrt() {
            document.getElementById('translatedSrt').select(); document.execCommand('copy'); toast('Copied!');
        }
    </script>
</body>
</html>
