<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Multi-Model Pro</title>
    <style>
        :root { --p: #a855f7; --bg: #09090b; --c: #18181b; --t: #f4f4f5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t); display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--c); width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; border: 1px solid #27272a; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { text-align: center; background: linear-gradient(45deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #a1a1aa; }
        select {
            width: 100%; padding: 12px; border-radius: 10px; background: #000; color: #fff; border: 1px solid #27272a; margin-bottom: 20px; outline: none;
        }
        textarea { 
            width: 100%; height: 120px; background: #000; color: #10b981; border: 1px solid #27272a; 
            padding: 12px; border-radius: 12px; font-family: monospace; font-size: 12px; resize: none; box-sizing: border-box; margin-bottom: 15px;
        }
        .status-box { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #27272a; font-size: 13px; display: flex; justify-content: space-between; }
        .active-val { color: #fbbf24; font-weight: bold; }
        input[type="file"] { width: 100%; margin-bottom: 20px; color: #a1a1aa; }
        button { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-size: 16px; background: var(--p); color: white;
        }
        button:disabled { background: #27272a; opacity: 0.5; cursor: not-allowed; }
        #log { font-size: 11px; color: #71717a; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 Gemini Pro Master</h2>

    <label>AI Model ကို ရွေးချယ်ပါ</label>
    <select id="modelSelect">
        <option value="gemini-3.1-pro">Gemini 3.1 Pro (Smartest)</option>
        <option value="gemini-3.0-pro">Gemini 3.0 Pro</option>
        <option value="gemini-3.0-flash">Gemini 3.0 Flash (Faster)</option>
    </select>

    <label>Gemini API Keys (စာကြောင်းခြားပြီး အများကြီးထည့်နိုင်သည်)</label>
    <textarea id="keysArea" placeholder="AIzaSy...&#10;AIzaSy...&#10;AIzaSy..."></textarea>

    <div class="status-box">
        <span>Status: <span class="active-val" id="statusTxt">Idle</span></span>
        <span>Active Key: <span class="active-val" id="activeIdx">0</span></span>
    </div>

    <label>SRT ဖိုင် ရွေးချယ်ပါ</label>
    <input type="file" id="fileIn" accept=".srt">

    <button id="startBtn" onclick="runFlashAll()">Verify & Translate</button>
    
    <div id="log">စတင်ရန် Keys များနှင့် ဖိုင်ကို အရင်ပြင်ဆင်ပါ။</div>
</div>

<script>
    let validKeys = [];

    async function runFlashAll() {
        const keyInput = document.getElementById('keysArea').value.trim();
        const model = document.getElementById('modelSelect').value;
        const file = document.getElementById('fileIn').files[0];
        const btn = document.getElementById('startBtn');
        const log = document.getElementById('log');

        validKeys = keyInput.split('\n').map(k => k.trim()).filter(k => k.length > 20);

        if (validKeys.length === 0) return alert("API Key ထည့်ပေးပါ။");
        if (!file) return alert("SRT ဖိုင် ရွေးပေးပါ။");

        btn.disabled = true;
        log.innerText = "Scanning keys for " + model + "...";

        for (let i = 0; i < validKeys.length; i++) {
            document.getElementById('activeIdx').innerText = i + 1;
            const isWorking = await testKey(validKeys[i], model);
            
            if (isWorking) {
                document.getElementById('statusTxt').innerText = "Ready";
                document.getElementById('statusTxt').style.color = "#10b981";
                log.innerText = "✅ Key " + (i+1) + " အဆင်ပြေပါသည်။ ဘာသာပြန်ခြင်း စတင်ပါပြီ။";
                
                // SRT Translation Logic
                translateSRT(file, validKeys[i], model, log, btn);
                break;
            } else if (i === validKeys.length - 1) {
                log.innerText = "❌ မည်သည့် Key မှ အလုပ်မလုပ်ပါ။ (Limit ပြည့်နေခြင်း ဖြစ်နိုင်သည်)";
                btn.disabled = false;
            }
        }
    }

    async function testKey(key, model) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: "hi"}]}]})
            });
            return res.ok;
        } catch (e) { return false; }
    }

    async function translateSRT(file, key, model, log, btn) {
        const reader = new FileReader();
        reader.onload = async function(e) {
            const text = e.target.result;
            const lines = text.split(/\r?\n/);
            const outputLines = [];
            let counter = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.trim() && !line.match(/^\d+$/) && !line.includes("-->")) {
                    // Translate this line via Gemini API
                    const translated = await translateText(line, key, model);
                    outputLines.push(translated);
                    counter++;
                    log.innerText = `Translating lines... ${counter}/${lines.length}`;
                } else {
                    outputLines.push(line);
                }
            }

            // Auto download
            const blob = new Blob([outputLines.join("\n")], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = file.name.replace(".srt", "_MM.srt");
            a.click();
            btn.disabled = false;
            log.innerText = "✅ Translation complete!";
        };
        reader.readAsText(file, "UTF-8");
    }

    async function translateText(text, key, model) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: `Translate this to Burmese: ${text}`}]}]})
            });
            const data = await res.json();
            return data?.candidates?.[0]?.content?.[0]?.text || text;
        } catch (e) {
            return text;
        }
    }
</script>

</body>
</html>
