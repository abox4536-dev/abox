<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Flash - Auto Key Rotation</title>
    <style>
        :root { --p: #a855f7; --bg: #09090b; --c: #18181b; --t: #e4e4e7; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t); display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--c); width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; border: 1px solid #27272a; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h2 { text-align: center; background: linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        
        .box { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #a1a1aa; }
        
        /* Multi-line Input for Keys */
        textarea { 
            width: 100%; height: 100px; background: #000; color: #10b981; border: 1px solid #27272a; 
            padding: 12px; border-radius: 12px; font-family: monospace; font-size: 12px; resize: none; box-sizing: border-box;
        }

        .status-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #000; padding: 10px 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #27272a;
        }

        .key-indicator { font-size: 12px; color: #fbbf24; }
        
        button { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px; 
        }
        
        #flashBtn { background: var(--p); color: white; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        #flashBtn:disabled { background: #27272a; opacity: 0.5; cursor: not-allowed; box-shadow: none; }

        .log { font-size: 11px; color: #71717a; margin-top: 15px; max-height: 60px; overflow-y: auto; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Gemini Flash Pro</h2>

    <div class="box">
        <label>API Keys (တစ်ခုစီကို စာကြောင်းခြားပြီး ထည့်ပါ)</label>
        <textarea id="keysArea" placeholder="AIza...&#10;AIza...&#10;AIza..."></textarea>
    </div>

    <div class="status-bar">
        <span class="key-indicator" id="activeKey">Active: None</span>
        <span id="keyCount" style="font-size: 12px;">Keys: 0</span>
    </div>

    <div class="box">
        <label>Select SRT File</label>
        <input type="file" id="fileIn" accept=".srt" style="width:100%; color: #a1a1aa;">
    </div>

    <button id="flashBtn" onclick="startFlash()">Verify & Start Flash</button>

    <div class="log" id="logger">Waiting for Keys and File...</div>
</div>

<script>
    let validKeys = [];
    let currentIdx = 0;

    async function startFlash() {
        const rawKeys = document.getElementById('keysArea').value.trim().split('\n');
        const file = document.getElementById('fileIn').files[0];
        const btn = document.getElementById('flashBtn');
        const logger = document.getElementById('logger');

        validKeys = rawKeys.map(k => k.trim()).filter(k => k.length > 10);
        
        if (validKeys.length === 0) return alert("Key အနည်းဆုံး တစ်ခု ထည့်ပေးပါ။");
        if (!file) return alert("SRT ဖိုင် အရင်ရွေးပါ။");

        btn.disabled = true;
        logger.innerText = "Checking Keys one by one...";

        for (let i = 0; i < validKeys.length; i++) {
            const isWorking = await verifyKey(validKeys[i], i + 1);
            if (isWorking) {
                currentIdx = i;
                document.getElementById('activeKey').innerText = `Active: Key ${i + 1}`;
                document.getElementById('keyCount').innerText = `Keys: ${validKeys.length}`;
                logger.innerText = "🚀 Working Key Found! Starting Translation...";
                // ဤနေရာတွင် Translation Function ကို ဆက်လက်ခေါ်ယူနိုင်သည်
                break;
            } else if (i === validKeys.length - 1) {
                logger.innerText = "❌ No working keys found. Please check your keys.";
                btn.disabled = false;
            }
        }
    }

    async function verifyKey(key, num) {
        document.getElementById('activeKey').innerText = `Testing: Key ${num}`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
            });
            return res.ok;
        } catch (e) {
            return false;
        }
    }
</script>

</body>
</html>
