<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini SRT Master - Fix Version</title>
    <style>
        :root { --p: #8b5cf6; --bg: #0f172a; --c: #1e293b; --t: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t); display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--c); width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: var(--p); text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #vBtn { background: #334155; color: white; }
        #vBtn.ok { background: #10b981; }
        #tBtn { background: var(--p); color: white; opacity: 0.5; pointer-events: none; }
        #tBtn.active { opacity: 1; pointer-events: auto; }
        .status { margin-top: 15px; font-size: 13px; text-align: center; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 Gemini SRT Pro</h2>
    
    <label style="font-size: 13px;">Gemini API Key</label>
    <input type="password" id="keyInput" placeholder="Enter API Key here">
    <button id="vBtn" onclick="verify()">Verify Key</button>

    <label style="font-size: 13px; margin-top: 20px; display: block;">Select SRT File</label>
    <input type="file" id="srtInput" accept=".srt" onchange="check()">

    <button id="tBtn" onclick="alert('Starting translation...')">Start Translation</button>
    <div class="status" id="msg">Key ကို အရင်စစ်ဆေးပေးပါ။</div>
</div>

<script>
    let keyReady = false;

    async function verify() {
        const key = document.getElementById('keyInput').value.trim();
        const btn = document.getElementById('vBtn');
        const msg = document.getElementById('msg');

        if(!key) return;
        btn.innerText = "Checking...";

        try {
            // နောက်ဆုံးပေါ် v1beta API ကို စစ်ဆေးခြင်း
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
            });

            const data = await res.json();

            if (res.ok) {
                keyReady = true;
                btn.innerText = "✓ Key Valid";
                btn.classList.add('ok');
                document.getElementById('keyInput').disabled = true;
                msg.innerText = "Key အောင်မြင်စွာ စစ်ဆေးပြီးပါပြီ။";
                check();
            } else {
                throw new Error(data.error ? data.error.message : "Invalid Key");
            }
        } catch (e) {
            btn.innerText = "Verify Again";
            alert("Error: " + e.message + "\n\nKey မှားနေပါသည် (သို့) AI Studio မှာ Key အသစ်ပြန်ယူပါ။");
        }
    }

    function check() {
        const file = document.getElementById('srtInput').files[0];
        if(keyReady && file) {
            document.getElementById('tBtn').classList.add('active');
            document.getElementById('msg').innerText = "ဘာသာပြန်ရန် အဆင်သင့်ဖြစ်ပါပြီ။";
        }
    }
</script>

</body>
</html>
