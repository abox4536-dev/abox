<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Master Pro</title>
    <style>
        :root { --accent: #00f2fe; --bg: #0d1117; --card: #161b22; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #30363d; width: 100%; max-width: 550px; text-align: center; }
        h2 { color: var(--accent); margin-bottom: 25px; }
        .select-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #8b949e; }
        select { width: 100%; padding: 12px; border-radius: 10px; background: #010409; color: white; border: 1px solid #30363d; outline: none; }
        .upload-box { border: 2px dashed #30363d; padding: 40px; border-radius: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-box:hover { border-color: var(--accent); background: rgba(0, 242, 254, 0.05); }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #status { margin: 15px 0; font-size: 14px; color: #fbbf24; font-weight: bold; }
        textarea { width: 100%; height: 200px; background: #010409; color: #7ee787; border: 1px solid #30363d; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎙️ AI Subtitle Master</h2>
    
    <div class="select-group">
        <label>Gemini Model ရွေးချယ်ပါ</label>
        <select id="modelSelect">
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (3.1)</option>
            <option value="gemini-1.5-pro-002">Gemini 1.5 Pro (3.0)</option>
            <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash</option>
        </select>
    </div>

    <div class="upload-box" onclick="document.getElementById('audioFile').click()">
        <span id="fileLabel">အသံဖိုင် ရွေးချယ်ပါ</span>
        <input type="file" id="audioFile" accept="audio/*" style="display:none" onchange="updateName()">
    </div>

    <button id="runBtn" onclick="startProcess()">Start Processing</button>
    <div id="status">Brave Shield ပိတ်ထားပေးပါ</div>

    <textarea id="engOut" readonly placeholder="English Transcript"></textarea>
    <textarea id="mmOut" readonly placeholder="Myanmar SRT Output"></textarea>
</div>

<script>
    // --- Configuration (ဆရာ့ ID နှင့် Token ထည့်ထားပြီးသားဖြစ်သည်) ---
    const CF_ID = "44e588d3eaa53fb812cb6705e8f400a3"; // မှန်ပါတယ်
const CF_TOKEN = "cfut_nbaSE8ZYTTkuQpF1G1CevaBcW0n8HqH13KmxoUV787e2fc2f"; // Token အဟောင်းကို ဖျက်ပြီး အသစ်ထည့်ပါ

    const G_KEYS = ["AQ.Ab8RN6Ll7FJ0CEQYnWO4IQgudeaaTzEomwYOYT_QqV54-v97Uw"]; // ဆရာ့ Gemini Key တစ်ခုပဲ ထည့်ပေးဖို့ လိုပါတော့တယ်

    function updateName() {
        const f = document.getElementById('audioFile').files[0];
        if(f) document.getElementById('fileLabel').innerText = f.name;
    }

    async function startProcess() {
        const file = document.getElementById('audioFile').files[0];
        const model = document.getElementById('modelSelect').value;
        if(!file) return alert("ဖိုင်အရင်ရွေးပါ");

        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        btn.disabled = true;

        status.innerText = "⏳ Cloudflare Whisper AI ဖြင့် စာသားထုတ်နေသည်...";
        const engText = await getWhisper(file);
        
        if(!engText) {
            status.innerText = "❌ Cloudflare Error: Token သို့မဟုတ် ID မှားနေပါသည်။";
            btn.disabled = false; return;
        }

        document.getElementById('engOut').value = engText;
        document.getElementById('engOut').style.display = "block";

        status.innerText = `⏳ ${model} ဖြင့် မြန်မာပြန်နေသည်...`;
        let mmSrt = "";
        for(let k of G_KEYS) {
            try {
                mmSrt = await getGemini(engText, k, model);
                if(mmSrt) break;
            } catch(e) {}
        }

        if(mmSrt) {
            document.getElementById('mmOut').value = mmSrt;
            document.getElementById('mmOut').style.display = "block";
            status.innerText = "✅ အားလုံး အောင်မြင်စွာ ပြီးစီးပါပြီ!";
        } else {
            status.innerText = "❌ Gemini Error: API Key ကို စစ်ဆေးပါ။";
        }
        btn.disabled = false;
    }

    async function getWhisper(file) {
        try {
            const url = `https://api.cloudflare.com/client/v4/accounts/${CF_ID}/ai/run/@cf/openai/whisper`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Authorization": `Bearer ${CF_TOKEN}` },
                body: file
            });
            const data = await res.json();
            return data.result.text;
        } catch(e) { return null; }
    }

    async function getGemini(text, key, model) {
        const prompt = "Please translate this transcript to Myanmar language in SRT format:\n\n" + text;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }
</script>
</body>
</html>
